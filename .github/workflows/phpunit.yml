name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl, pdo_sqlite
          ini-values: post_max_size=256M, memory_limit=2G

      - name: Install Composer dependencies
        run: composer install --no-progress --no-suggest --prefer-dist

      - name: Prepare SQLite database
        run: |
          mkdir -p database
          touch database/testing.sqlite
          cp .env.example .env
          php -r "file_exists('database/testing.sqlite') || touch('database/testing.sqlite');"
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/testing.sqlite

      - name: Create storage directories
        run: |
          mkdir -p storage/framework/cache storage/framework/sessions storage/framework/views storage/logs

      - name: Run migrations
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/testing.sqlite
        run: php artisan key:generate --ansi && php artisan migrate --force

      - name: Run test suite
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/testing.sqlite
        run: php artisan test --ansi
