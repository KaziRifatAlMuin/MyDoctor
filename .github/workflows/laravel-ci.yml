name: Laravel CI Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  tests:
    name: PHP ${{ matrix.php }} – Laravel Tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.2"]

    steps:
      # ── 1. Check out code ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up PHP with required extensions ─────────────────
      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_sqlite, sqlite3, bcmath, json, tokenizer, xml, ctype, fileinfo
          coverage: none          # no coverage report needed; keeps CI fast

      # ── 3. Cache Composer dependencies ────────────────────────
      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      # ── 4. Install PHP dependencies ────────────────────────────
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --ansi

      # ── 5. Prepare environment ─────────────────────────────────
      - name: Copy .env for CI
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate --ansi

      # ── 6. Validate config & routes load without errors ────────
      - name: Clear & cache config (smoke test)
        run: |
          php artisan config:clear
          php artisan route:list > /dev/null

      # ── 7. Run migrations (SQLite in-memory via phpunit.xml) ───
      - name: Run database migrations
        run: php artisan migrate --env=testing --force --ansi

      # ── 8. Execute the full test suite ─────────────────────────
      - name: Run PHPUnit tests
        run: php artisan test --ansi
